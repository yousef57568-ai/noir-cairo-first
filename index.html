<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR CAIRO</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  cursor:none;
}

/* cursor */
#cursor{
  width:12px;
  height:12px;
  border:1px solid gold;
  border-radius:50%;
  position:fixed;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9999;
}

/* nav */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #222;
}

.nav-links{
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-links a{
  color:#aaa;
  text-decoration:none;
}

.nav-links a:hover{
  color:gold;
}

.btn{
  border:1px solid gold;
  padding:6px 12px;
  color:gold;
  text-decoration:none;
}

.btn:hover{
  background:gold;
  color:#000;
}

/* hero */
.hero{
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:60px;
  color:gold;
}
</style>
</head>

<body>

<div id="cursor"></div>

<nav>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Shop</a></li>
  </ul>

  <div>
    <a class="btn" href="https://instagram.com/noir_cairo2026" target="_blank">Instagram</a>
    <a class="btn" href="https://wa.me/201127002206" target="_blank">WhatsApp</a>
  </div>
</nav>

<div class="hero">
  NOIR CAIRO
</div>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
